<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title> Blog preview card / Frontend Mentor</title>

</head>

<body>
  <main>

    <section>
      <img src="/assets/images/illustration-article.svg" alt="A preview vizualiton of the content's card ">
      <h4 class="text-preset-3 card_tag">Learning</h4>
      <p class="published_date">Published 21 Dec 2023</p>
      <h2 class="text-preset-1">HTML & CSS foundations</h2>
      <p class="text-preset-2">These languages are the backbone of every website, defining structure, content, and
        presentation.</p>

      <div class="card_author">

        <img src="/assets/images/image-avatar.webp" alt="Author of the image" aria-label="image_card_author">
        <p class="text-preset-3">Greg Hooper</p>

      </div>


    </section>

  </main>

</body>

</html>
